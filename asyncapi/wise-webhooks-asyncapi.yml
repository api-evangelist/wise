  schemas:
    EventEnvelope:
      type: object
      description: |
        Standard envelope for all Wise webhook notifications.
      required:
        - subscription_id
        - event_type
        - schema_version
        - sent_at
        - data
      properties:
        subscription_id:
          type: string
          format: uuid
          description: Identifier of the webhook subscription that delivered this event.
          example: '01234567-89ab-cdef-0123-456789abcdef'
        event_type:
          type: string
          description: Event identifier (e.g. `transfers#state-change`).
        schema_version:
          type: string
          description: Notification schema version.
          example: '2.0.0'
        sent_at:
          type: string
          format: date-time
          description: Timestamp at which Wise dispatched the notification.
          example: '2020-01-01T12:34:56Z'
        data:
          type: object
          description: Event-specific payload. Shape depends on `event_type`.

    WebhookHeaders:
      type: object
      description: |
        HTTP request headers Wise sends with every webhook delivery.
      required:
        - X-Signature-SHA256
        - X-Delivery-Id
      properties:
        X-Signature-SHA256:
          type: string
          description: |
            Base64-encoded RSA-SHA256 signature of the raw HTTP request body.
            Verify using the relevant (production or sandbox) Wise public key.
          example: 'M3o3z6sV...base64...=='
        X-Delivery-Id:
          type: string
          format: uuid
          description: Unique delivery UUID assigned to each notification attempt.
          example: 'abcd1234-5678-90ab-cdef-1234567890ab'
        X-Test-Notification:
          type: string
          enum: ['true']
          description: Present and equal to `true` for test notifications sent during subscription setup.

    Resource:
      type: object
      description: Generic Wise resource reference embedded in event data.
      properties:
        type:
          type: string
          description: Resource type (e.g. `transfer`, `balance`, `profile`).
        id:
          oneOf:
            - type: integer
            - type: string
          description: Resource identifier.
        profile_id:
          type: integer
          description: Owning profile identifier.
        account_id:
          type: integer
          description: Owning account identifier where applicable.

    TransferStateChangeData:
      type: object
      description: Payload for `transfers#state-change`.
      required:
        - resource
        - current_state
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        current_state:
          type: string
          description: Current transfer state (e.g. `incoming_payment_waiting`, `processing`, `funds_converted`, `outgoing_payment_sent`, `cancelled`, `funds_refunded`, `bounced_back`, `charged_back`).
        previous_state:
          type: string
          description: Previous transfer state.
        occurred_at:
          type: string
          format: date-time
          description: When the state change occurred (use for ordering).

    TransferActiveCasesData:
      type: object
      description: Payload for `transfers#active-cases`.
      required:
        - resource
        - active_cases
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        active_cases:
          type: array
          description: Identifiers of cases currently active against the transfer.
          items:
            type: string
        occurred_at:
          type: string
          format: date-time

    TransferRefundData:
      type: object
      description: Payload for `transfers#refund`.
      required:
        - resource
        - current_state
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        current_state:
          type: string
          description: Always `funds_refunded` for this event.
        previous_state:
          type: string
        occurred_at:
          type: string
          format: date-time

    TransferPayoutFailureData:
      type: object
      description: Payload for `transfers#payout-failure`.
      required:
        - transfer_id
        - profile_id
        - occurred_at
      properties:
        transfer_id:
          type: integer
        profile_id:
          type: integer
        failure_reason_code:
          type: string
          description: Machine-readable failure code.
        failure_description:
          type: string
          description: Human-readable failure description.
        occurred_at:
          type: string
          format: date-time

    BalanceUpdateData:
      type: object
      description: Payload for `balances#update`.
      required:
        - resource
        - transaction_type
        - amount
        - currency
        - occurred_at
      properties:
        resource:
          allOf:
            - $ref: '#/components/schemas/Resource'
            - type: object
              properties:
                type:
                  type: string
                  const: balance
        transaction_type:
          type: string
          enum: [credit, debit]
        amount:
          type: number
          description: Signed transaction amount in the balance currency.
        currency:
          type: string
          description: ISO 4217 currency code.
        post_transaction_balance_amount:
          type: number
          description: Balance available amount after this transaction.
        transfer_reference:
          type: string
          description: Reference text associated with the underlying transfer (when present).
        balance_id:
          type: integer
          description: Affected balance identifier.
        channel_name:
          type: string
          description: Channel that produced the transaction (e.g. `bank_transfer`).
        step_id:
          type: string
          description: Step identifier inside the underlying activity, when applicable.
        occurred_at:
          type: string
          format: date-time

    BalanceCreditData:
      type: object
      description: Payload for the deprecated `balances#credit` event.
      required:
        - resource
        - amount
        - currency
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        amount:
          type: number
        currency:
          type: string
        post_transaction_balance_amount:
          type: number
        transaction_type:
          type: string
          const: credit
        channel_name:
          type: string
        occurred_at:
          type: string
          format: date-time

    BalanceAccountStateChangeData:
      type: object
      description: Payload for `balances#account-state-change`.
      required:
        - resource
        - current_state
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        current_state:
          type: string
          description: New balance account state.
        previous_state:
          type: string
        occurred_at:
          type: string
          format: date-time

    ProfileVerificationStateChangeData:
      type: object
      description: Payload for `profiles#verification-state-change`.
      required:
        - resource
        - current_state
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        current_state:
          type: string
          enum: [verified, not_verified]
        previous_state:
          type: string
          enum: [verified, not_verified]
        occurred_at:
          type: string
          format: date-time

    ProfileStateChangeData:
      type: object
      description: Payload for `profiles#state-change`.
      required:
        - resource
        - current_state
        - occurred_at
      properties:
        resource:
          $ref: '#/components/schemas/Resource'
        current_state:
          type: string
          description: Current profile state.
        previous_state:
          type: string
        occurred_at:
          type: string
          format: date-time

    ProfileCddCheckStateChangeData:
      type: object
      description: Payload for `profiles#cdd-check-state-change`.
      required:
        - current_state
        - occurred_at
      properties:
        current_state:
          type: string
          enum: [VERIFIED, EVIDENCE_REQUIRED]
        review_outcome:
          type: string
          description: Outcome of the review, when available.
        required_evidences:
          type: array
          description: List of evidences required from the customer.
          items:
            type: string
        source_of_income:
          type: string
        source_of_funding:
          type: string
        occurred_at:
          type: string
          format: date-time

    CardTransactionStateChangeData:
      type: object
      description: Payload for `cards#transaction-state-change`.
      required:
        - resource
        - transaction_id
        - transaction_state
        - occurred_at
      properties:
        resource:
          type: object
          properties:
            profile_id:
              type: integer
            card_token:
              type: string
            card_last_digits:
              type: string
        transaction_id:
          type: string
        transaction_type:
          type: string
        transaction_state:
          type: string
        transaction_amount:
          type: object
          properties:
            value:
              type: number
            currency:
              type: string
        fees:
          type: array
          items:
            type: object
            properties:
              amount:
                type: number
              currency:
                type: string
              fee_type:
                type: string
        merchant:
          type: object
          properties:
            name:
              type: string
            location:
              type: string
            category:
              type: string
        debits:
          type: array
          items:
            type: object
        credits:
          type: array
          items:
            type: object
        creation_time:
          type: string
          format: date-time
        occurred_at:
          type: string
          format: date-time

    CardOrderStatusChangeData:
      type: object
      description: Payload for `cards#card-order-status-change`.
      required:
        - order_id
        - order_status
        - occurred_at
      properties:
        order_id:
          type: string
        order_status:
          type: string
        delivery_vendor:
          type: string
          description: Present for physical cards only.
        occurred_at:
          type: string
          format: date-time

    HoldLimitBreachData:
      type: object
      description: Payload for `hold-limit-breach#update`.
      required:
        - state
        - occurred_at
      properties:
        state:
          type: string
          description: New breach state (e.g. opened, closed).
        closing_reason:
          type: string
          description: Reason populated when the breach is closed.
        occurred_at:
          type: string
          format: date-time

    BulkSettlementData:
      type: object
      description: Payload for `bulk-settlement#payment-received`.
      properties:
        amount_matched:
          type: boolean
          description: Whether the source and target amounts matched the expected settlement.
        source_amount:
          type: object
          properties:
            value:
              type: number
            currency:
              type: string
        target_amount:
          type: object
          properties:
            value:
              type: number
            currency:
              type: string
        occurred_at:
          type: string
          format: date-time

    SwiftInCreditData:
      type: object
      description: Payload for `swift-in#credit`.
      properties:
        action:
          type: object
          properties:
            type:
              type: string
            id:
              type: integer
            profile_id:
              type: integer
            account_id:
              type: integer
        resource:
          type: object
          properties:
            uetr:
              type: string
              description: SWIFT Unique End-to-End Transaction Reference.
            reference:
              type: string
            recipient:
              type: object
            sender:
              type: object
        exchange_rate:
          type: number
        instructed_amount:
          type: object
          properties:
            value:
              type: number
            currency:
              type: string
        settled_amount:
          type: object
          properties:
            value:
              type: number
            currency:
              type: string
        fee:
          type: object
          properties:
            wise:
              type: array
              items:
                type: object
                properties:
                  amount:
                    type: number
                  currency:
                    type: string
            correspondent:
              type: array
              items:
                type: object
                properties:
                  amount:
                    type: number
                  currency:
                    type: string
        occurred_at:
          type: string
          format: date-time

  securitySchemes:
    WiseWebhookSignature:
      type: httpApiKey
      in: header
      name: X-Signature-SHA256
      description: |
        Wise signs every webhook delivery using RSA-SHA256 over the raw HTTP
        request body. The Base64-encoded signature is sent in
        `X-Signature-SHA256`. Subscribers verify the signature with Wise's
        published RSA public key for the relevant environment.

        Production public key (PEM):
        ```
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAvO8vXV+JksBzZAY6GhSO
        XdoTCfhXaaiZ+qAbtaDBiu2AGkGVpmEygFmWP4Li9m5+Ni85BhVvZOodM9epgW3F
        bA5Q1SexvAF1PPjX4JpMstak/QhAgl1qMSqEevL8cmUeTgcMuVWCJmlge9h7B1CS
        D4rtlimGZozG39rUBDg6Qt2K+P4wBfLblL0k4C4YUdLnpGYEDIth+i8XsRpFlogx
        CAFyH9+knYsDbR43UJ9shtc42Ybd40Afihj8KnYKXzchyQ42aC8aZ/h5hyZ28yVy
        Oj3Vos0VdBIs/gAyJ/4yyQFCXYte64I7ssrlbGRaco4nKF3HmaNhxwyKyJafz19e
        HwIDAQAB
        -----END PUBLIC KEY-----
        ```

        Sandbox public key (PEM):
        ```
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAwpb91cEYuyJNQepZAVfP
        ZIlPZfNUefH+n6w9SW3fykqKu938cR7WadQv87oF2VuT+fDt7kqeRziTmPSUhqPU
        ys/V2Q1rlfJuXbE+Gga37t7zwd0egQ+KyOEHQOpcTwKmtZ81ieGHynAQzsn1We3j
        wt760MsCPJ7GMT141ByQM+yW1Bx+4SG3IGjXWyqOWrcXsxAvIXkpUD/jK/L958Cg
        nZEgz0BSEh0QxYLITnW1lLokSx/dTianWPFEhMC9BgijempgNXHNfcVirg1lPSyg
        z7KqoKUN0oHqWLr2U1A+7kqrl6O2nx3CKs1bj1hToT1+p4kcMoHXA7kA+VBLUpEs
        VwIDAQAB
        -----END PUBLIC KEY-----
        ```

        Reference implementations:
        https://github.com/transferwise/digital-signatures-examples/tree/main/verify-webhook-signature

security:
  - WiseWebhookSignature: []

tags:
  - name: Webhooks
    description: HTTP push notifications from Wise to subscriber endpoints.
  - name: Transfers
    description: Transfer lifecycle and case events.
  - name: Balances
    description: Multi-currency balance credit, debit and account state events.
  - name: Profiles
    description: Profile state, verification and compliance events.
  - name: Cards
    description: Card status, production, 3DS, transaction and order events.
  - name: AccountDetails
    description: Multi-currency receiving account events.
  - name: Batches
    description: Batch payment initiation lifecycle events.
  - name: Settlements
    description: Bulk settlement events.
  - name: Disputes
    description: Card and transaction dispute events.
  - name: Support
    description: Partner support case events.
  - name: SWIFT
    description: SWIFT inbound credit events.

externalDocs:
  description: Wise Platform webhook documentation
  url: https://docs.wise.com/guides/developer/webhooks
