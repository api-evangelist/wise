specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Wise
providerId: wise
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Payments
  - FX
  - Cross-Border
  - Banking
  - Multi-Currency
  - Plans
description: >-
  Wise does not sell tiered API plans. The Wise Platform API is free to access for
  registered Wise account holders; revenue is earned per transaction through a
  fixed-plus-percentage transfer fee and a small markup over the mid-market exchange
  rate. Pricing varies by route (source currency, target currency, pay-in method) and
  is documented per corridor. Wise Business adds a one-time account-opening fee in
  most regions and per-card issuance fees for the Wise debit card.
sources:
  - https://wise.com/pricing
  - https://wise.com/help/articles/2932150
  - https://docs.wise.com/
plans:
  - id: wise-personal
    name: Personal Account
    type: pay-as-you-go
    description: >-
      Free Wise account for individuals. No monthly fees, no API plan fees. Each
      transfer charges a route-specific fixed fee plus a percentage of the converted
      amount, plus a markup applied on top of the mid-market FX rate when crossing
      currencies.
    entries:
      - label: Account Opening
        name: account_opening
        type: flat
        metric: account
        limit: 1
        timeFrame: lifetime
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Per Transfer Fee (Variable)
        name: transfer_fee
        type: metered
        metric: transfer
        limit: -1
        timeFrame: usage
        unit: 1
        price: route-specific (fixed + %)
        userMultiplied: false
      - label: FX Markup
        name: fx_markup
        type: metered
        metric: fx_conversion
        limit: -1
        timeFrame: usage
        unit: 1
        price: small markup over mid-market rate
        userMultiplied: false
    elements:
      - name: Multi-Currency Account (56+ Currencies)
      - name: Local Bank Details (USD, EUR, GBP, AUD, NZD, etc.)
      - name: Wise Debit Card (Optional, One-Time Fee)
      - name: Free Platform API Access
  - id: wise-business
    name: Business Account
    type: pay-as-you-go
    description: >-
      Wise Business account. One-time account-opening fee in most regions
      (e.g. ~$31 in the US, £45 in the UK). Per-transfer pricing matches the personal
      product. Adds batch payments, multi-user access with role-based permissions,
      and accounting integrations.
    entries:
      - label: Account Opening (One-Time)
        name: account_opening
        type: flat
        metric: account
        limit: 1
        timeFrame: lifetime
        unit: 1
        price: region-specific (~$31 US / GBP 45 UK)
        userMultiplied: false
      - label: Per Transfer Fee (Variable)
        name: transfer_fee
        type: metered
        metric: transfer
        limit: -1
        timeFrame: usage
        unit: 1
        price: route-specific (fixed + %)
        userMultiplied: false
      - label: FX Markup
        name: fx_markup
        type: metered
        metric: fx_conversion
        limit: -1
        timeFrame: usage
        unit: 1
        price: small markup over mid-market rate
        userMultiplied: false
      - label: Batch Payments
        name: batch_payments
        type: included
        metric: batch
        limit: -1
        timeFrame: usage
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Multi-Currency Account
      - name: Local Receiving Details
      - name: Batch Payments (Up to 1,000 Per File)
      - name: Multi-User Access With RBAC
      - name: Accounting Integrations (Xero, QuickBooks, FreshBooks)
      - name: Free Platform API Access
  - id: wise-platform
    name: Wise Platform (Embedded)
    type: enterprise
    description: >-
      Embedded partner offering for banks, fintechs, and software platforms that
      integrate Wise into their own products. Pricing is custom-negotiated and reflects
      volume, settlement terms, and the partner integration footprint (Send, Receive,
      Convert, Hold). Per-transaction economics are baked into the contract.
    entries:
      - label: Platform Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        unit: 1
        price: custom
        userMultiplied: false
      - label: Per Transaction
        name: transaction_fee
        type: metered
        metric: transfer
        limit: -1
        timeFrame: usage
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Embedded Send and Receive
      - name: Multi-Currency Hold and Convert
      - name: Compliance Pass-Through
      - name: Dedicated Implementation Support
      - name: Co-Branding Options
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
