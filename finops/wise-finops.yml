specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Wise
providerId: wise
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Payments
  - FX
  - Cross-Border
  - Banking
  - Multi-Currency
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps for Wise. The Wise Platform API itself is free; cost is incurred
  per transaction in two components - a route-specific transfer fee (a fixed amount plus
  a percentage of the converted amount) and a small markup applied on top of the
  mid-market FX rate when a conversion occurs. Wise Business adds a one-time
  account-opening fee in most regions and per-card issuance fees. Wise Platform
  (embedded partner) tenants negotiate consolidated pricing with monthly settlement.
sources:
  - https://wise.com/pricing
  - https://wise.com/help/articles/2932150
  - https://docs.wise.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Wise Payments Limited
serviceCategory: Payments
billingModel:
  pricingCategory: Pay-As-You-Go (Transaction Fees + FX Markup)
  billingFrequency: Per Transaction (statement monthly)
  billingCurrency: Multi-Currency
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Tax
    - Credit
focusColumns:
  ServiceName: Wise Platform
  ServiceCategory: Payments
  ProviderName: Wise
  PublisherName: Wise Payments Limited
  InvoiceIssuerName: Wise Payments Limited
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: transfer_fee
    description: >-
      Per-transfer fee composed of a route-specific fixed component plus a percentage of
      the converted amount. Visible on the quote response before the transfer is created.
    unit: transfer
    aggregation: sum
    dimensions:
      - source_currency
      - target_currency
      - pay_in_method
      - profile_type
  - name: fx_markup
    description: >-
      Margin applied to the mid-market exchange rate on currency conversions. Captured
      implicitly in the rate returned by the Quotes API.
    unit: fx_conversion
    aggregation: sum
    dimensions:
      - source_currency
      - target_currency
  - name: account_opening_fee
    description: >-
      One-time fee charged on Wise Business account creation in most regions
      (e.g. ~$31 US / GBP 45 UK).
    unit: account
    aggregation: sum
    dimensions:
      - region
  - name: card_fee
    description: >-
      Wise debit card issuance and replacement fees (issuance ~$9 in the US, GBP 7 UK).
    unit: card
    aggregation: sum
    dimensions:
      - region
      - card_type
  - name: platform_partner_fee
    description: >-
      Embedded Wise Platform partner per-transaction or settlement fee, negotiated
      contractually for banks and fintechs that resell Wise capabilities.
    unit: transaction
    aggregation: sum
    dimensions:
      - partner_id
      - transaction_type
principles:
  - name: Visibility
    description: >-
      Every transfer carries an explicit fee breakdown on the quote and the resulting
      transfer object. Use the Statements API (JSON/CSV/MT940) to reconcile fees and FX
      markup against the converted amount line by line.
  - name: Allocation
    description: >-
      Tag transfers with customerTransactionId on creation to attribute spend to a
      cost center or end-customer. Wise Business multi-user RBAC and Wise Platform
      partner accounts allow per-team or per-tenant attribution.
  - name: Optimization
    description: >-
      Pre-fund transfers from a same-currency Wise balance to skip the FX markup. Batch
      payouts (up to 1,000 per file) reduce per-transfer overhead. Choose lower-fee
      pay-in methods (bank debit / ACH) over card funding where speed permits.
  - name: Accountability
    description: >-
      Assign a treasury owner per Wise profile. Wire pay-in/pay-out paths and FX corridors
      to internal cost categories so the FX markup is treated as a controllable spend
      lever, not a hidden cost.
maintainers:
