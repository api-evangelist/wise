  - aid: wise:recipients
    name: Wise Recipients API
    description: Manages beneficiary bank account records. Recipients store the destination account details (name, currency,
      account number, routing/IBAN/SWIFT details) used as the target of a transfer. The API supports creating, retrieving, listing,
      and deleting recipient accounts across 70+ supported currencies.
    humanURL: https://docs.wise.com/api-docs/api-reference/recipient
    baseURL: https://api.wise.com/v1
    tags:
    - Recipients
    - Beneficiaries
    - Bank Accounts
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/recipient
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:quotes
    name: Wise Quotes API
    description: Calculates the exchange rate, fees, and estimated delivery time for a prospective transfer between two currencies.
      A quote pins the FX rate for a short window and is a required prerequisite to creating a transfer. Supports source-amount,
      target-amount, and pay-in option variations.
    humanURL: https://docs.wise.com/api-docs/api-reference/quote
    baseURL: https://api.wise.com/v3
    tags:
    - Quotes
    - FX
    - Pricing
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/quote
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:transfers
    name: Wise Transfers API
    description: Creates and tracks cross-border money movements. A transfer ties a quote to a recipient and is funded from
      a source balance or pay-in method. The API exposes create, fund, cancel, list, and detail operations along with status
      events.
    humanURL: https://docs.wise.com/api-docs/api-reference/transfer
    baseURL: https://api.wise.com/v1
    tags:
    - Transfers
    - Payments
    - Cross-Border
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/transfer
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:balances
    name: Wise Balances API
    description: Manages multi-currency balances held inside a profile. Supports listing balances, retrieving the available
      and reserved amounts per currency, opening and closing currency balances, and moving funds between balances within the
      same profile.
    humanURL: https://docs.wise.com/api-docs/api-reference/balance
    baseURL: https://api.wise.com/v4
    tags:
    - Balances
    - Multi-Currency
    - Wallets
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/balance
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:multi-currency-account
    name: Wise Multi-Currency Account API
    description: Provisions local bank account details (account number / routing / IBAN / SWIFT) for a profile across the supported
      receiving currencies, allowing a customer to receive money like a local in 56+ currencies.
    humanURL: https://docs.wise.com/api-docs/api-reference/multi-currency-account
    baseURL: https://api.wise.com/v1
    tags:
    - Multi-Currency Account
    - Receive Money
    - Local Bank Details
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/multi-currency-account
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:statements
    name: Wise Statements API
    description: Generates and downloads transaction statements for a balance over an arbitrary date range. Output formats include
      JSON, CSV, PDF, and MT940, supporting reconciliation and accounting workflows.
    humanURL: https://docs.wise.com/api-docs/api-reference/balance-statement
    baseURL: https://api.wise.com/v1
    tags:
    - Statements
    - Reporting
    - Accounting
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/balance-statement
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:cards
    name: Wise Cards API
    description: Issues, lists, and manages Wise debit cards linked to a profile balance. Includes operations for retrieving
      card details, freezing/unfreezing, replacing cards, and managing spending controls.
    humanURL: https://docs.wise.com/api-docs/api-reference/card
    baseURL: https://api.wise.com/v3
    tags:
    - Cards
    - Issuing
    - Spending Controls
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/card
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
  - aid: wise:webhooks
    name: Wise Webhooks API
    description: Subscribes a partner application to event notifications for transfers, balances, cards, and profile-state changes.
      Supports creating, listing, and deleting webhook subscriptions and verifying signed payloads.
    humanURL: https://docs.wise.com/api-docs/api-reference/subscription
    baseURL: https://api.wise.com/v3
    tags:
    - Webhooks
    - Events
    - Notifications
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/subscription
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
    - type: AsyncAPI
      url: asyncapi/wise-webhooks-asyncapi.yml
  - aid: wise:simulation
    name: Wise Simulation API
    description: Sandbox-only endpoints for advancing the lifecycle of test transfers (simulating funding, processing, completion,
      and failure paths) without moving real money. Used to exercise integration logic end-to-end against api.sandbox.transferwise.tech.
    humanURL: https://docs.wise.com/api-docs/api-reference/simulation
    baseURL: https://api.sandbox.transferwise.tech
    tags:
    - Simulation
    - Sandbox
    - Testing
    properties:
    - type: Documentation
      url: https://docs.wise.com/api-docs/api-reference/simulation
    - type: OpenAPI
      url: openapi/wise-platform-openapi.yml
