          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-profiles-profileId-total-funds-currency
      path: /v1/profiles/{profileId}/total-funds/{currency}
      operations:
      - name: totalfunds
        method: GET
        description: Get Total Funds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: currency
          in: path
          type: string
          description: Currency code (ISO 4217 Alphabetic Code). All values will be converted to this currency.
          required: true
    - name: v2-profiles-profileId-balance-movements
      path: /v2/profiles/{profileId}/balance-movements
      operations:
      - name: balancemovement
        method: POST
        description: Convert or Move Money Between Balances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: X-idempotence-uuid
          in: header
          type: string
          description: Unique identifier assigned by you. Used for idempotency check purposes. Should your call fail for technical
            reasons then you can use the same value again for ma
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v4-profiles-profileId-balances
      path: /v4/profiles/{profileId}/balances
      operations:
      - name: balancecreate
        method: POST
        description: Create a Balance Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: X-idempotence-uuid
          in: header
          type: string
          description: Unique identifier assigned by you. Used for idempotency check purposes. Should your call fail for technical
            reasons then you can use the same value again for ma
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: balancelist
        method: GET
        description: List Balances for a Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: types
          in: query
          type: string
          description: Comma-separated list of balance types to return. Acceptable values are `STANDARD` and `SAVINGS`.
          required: true
    - name: v4-profiles-profileId-balances-balanceId
      path: /v4/profiles/{profileId}/balances/{balanceId}
      operations:
      - name: balanceget
        method: GET
        description: Retrieve a Balance by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: balanceId
          in: path
          type: integer
          description: The balance ID.
          required: true
      - name: balancedelete
        method: DELETE
        description: Remove a Balance Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: balanceId
          in: path
          type: integer
          description: The balance ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
