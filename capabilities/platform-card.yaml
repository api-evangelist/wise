          in: path
          type: integer
          description: The ID of the profile that owns the card.
          required: true
        - name: cardToken
          in: path
          type: string
          description: The unique token identifying the card.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
