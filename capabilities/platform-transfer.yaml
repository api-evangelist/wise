          required: true
    - name: v3-profiles-profileId-transfers-transferId-payments
      path: /v3/profiles/{profileId}/transfers/{transferId}/payments
      operations:
      - name: transferfund
        method: POST
        description: Fund a transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID that created the transfer. Can be either your personal or business profile ID
          required: true
        - name: transferId
          in: path
          type: integer
          description: The transfer ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
