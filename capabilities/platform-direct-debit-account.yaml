naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — direct-debit-account
  description: 'Wise Platform API — direct-debit-account. 2 operations. Lead operation: Create a direct debit account. Self-contained
    Naftiko capability covering one Wise business surface.'
  tags:
  - Wise
  - direct-debit-account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-direct-debit-account
    baseUri: https://api.wise.com
    description: Wise Platform API — direct-debit-account business capability. Self-contained, no shared references.
    resources:
    - name: v1-profiles-profileId-direct-debit-accounts
      path: /v1/profiles/{profileId}/direct-debit-accounts
      operations:
      - name: directdebitaccountcreate
        method: POST
        description: Create a direct debit account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Your profile ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: directdebitaccountget
        method: GET
        description: Retrieve all direct debit accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Your profile ID.
          required: true
        - name: type
          in: query
          type: string
          description: Payment type for which the account is used.
          required: true
        - name: currency
          in: query
          type: string
          description: Currency of the bank account. 3-character currency code — `USD` for ACH direct debits, `CAD` for EFT
            direct debits.
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-direct-debit-account-rest
    port: 8080
    description: REST adapter for Wise Platform API — direct-debit-account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/profiles/{profileid}/direct-debit-accounts
      name: v1-profiles-profileid-direct-debit-accounts
      description: REST surface for v1-profiles-profileId-direct-debit-accounts.
      operations:
      - method: POST
        name: directdebitaccountcreate
        description: Create a direct debit account
        call: platform-direct-debit-account.directdebitaccountcreate
        with:
          profileId: rest.profileId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: directdebitaccountget
        description: Retrieve all direct debit accounts
        call: platform-direct-debit-account.directdebitaccountget
        with:
          profileId: rest.profileId
          type: rest.type
          currency: rest.currency
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-direct-debit-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — direct-debit-account. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-direct-debit-account
      description: Create a direct debit account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-direct-debit-account.directdebitaccountcreate
      with:
        profileId: tools.profileId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-all-direct-debit-accounts
      description: Retrieve all direct debit accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-direct-debit-account.directdebitaccountget
      with:
        profileId: tools.profileId
        type: tools.type
        currency: tools.currency
      outputParameters:
      - type: object
        mapping: $.
