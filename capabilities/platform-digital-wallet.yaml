naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — digital-wallet
  description: 'Wise Platform API — digital-wallet. 4 operations. Lead operation: Push Provisioning for Apple Pay. Self-contained
    Naftiko capability covering one Wise business surface.'
  tags:
  - Wise
  - digital-wallet
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-digital-wallet
    baseUri: https://api.wise.com
    description: Wise Platform API — digital-wallet business capability. Self-contained, no shared references.
    resources:
    - name: twcard-data-v1-push-provisioning-encrypted-payload-apple-pay
      path: /twcard-data/v1/push-provisioning/encrypted-payload/apple-pay
      operations:
      - name: pushprovisioningapplepayget
        method: POST
        description: Push Provisioning for Apple Pay
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: x-tw-twcard-card-token
          in: header
          type: string
          description: The card token identifying which card to retrieve push provisioning data for.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: twcard-data-v1-push-provisioning-encrypted-payload-google-pay
      path: /twcard-data/v1/push-provisioning/encrypted-payload/google-pay
      operations:
      - name: pushprovisioninggooglepayget
        method: POST
        description: Push provisioning for Google Pay
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: x-tw-twcard-card-token
          in: header
          type: string
          description: The card token identifying which card to retrieve push provisioning data for.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v3-spend-profiles-profileId-cards-cardToken-payment-tokens
      path: /v3/spend/profiles/{profileId}/cards/{cardToken}/payment-tokens
      operations:
      - name: pushprovisioningpaymenttokenslist
        method: POST
        description: List payment tokens for a card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID.
          required: true
        - name: cardToken
          in: path
          type: string
          description: The card token.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v3-spend-profiles-profileId-cards-cardToken-payment-tokens-paymentTokenUniqueRef
      path: /v3/spend/profiles/{profileId}/cards/{cardToken}/payment-tokens/{paymentTokenUniqueReference}/activation
      operations:
      - name: digitalwalletactivatepaymenttoken
        method: POST
        description: Manual provisioning payment token activation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID
          required: true
        - name: cardToken
          in: path
          type: string
          description: The card token
          required: true
        - name: paymentTokenUniqueReference
          in: path
          type: string
          description: The payment token unique reference issued by the scheme token service
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-digital-wallet-rest
    port: 8080
    description: REST adapter for Wise Platform API — digital-wallet. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/twcard-data/v1/push-provisioning/encrypted-payload/apple-pay
      name: twcard-data-v1-push-provisioning-encrypted-payload-apple-pay
      description: REST surface for twcard-data-v1-push-provisioning-encrypted-payload-apple-pay.
      operations:
      - method: POST
        name: pushprovisioningapplepayget
        description: Push Provisioning for Apple Pay
        call: platform-digital-wallet.pushprovisioningapplepayget
        with:
          x-tw-twcard-card-token: rest.x-tw-twcard-card-token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/twcard-data/v1/push-provisioning/encrypted-payload/google-pay
      name: twcard-data-v1-push-provisioning-encrypted-payload-google-pay
      description: REST surface for twcard-data-v1-push-provisioning-encrypted-payload-google-pay.
      operations:
      - method: POST
        name: pushprovisioninggooglepayget
        description: Push provisioning for Google Pay
        call: platform-digital-wallet.pushprovisioninggooglepayget
        with:
          x-tw-twcard-card-token: rest.x-tw-twcard-card-token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/spend/profiles/{profileid}/cards/{cardtoken}/payment-tokens
      name: v3-spend-profiles-profileid-cards-cardtoken-payment-tokens
      description: REST surface for v3-spend-profiles-profileId-cards-cardToken-payment-tokens.
      operations:
      - method: POST
        name: pushprovisioningpaymenttokenslist
        description: List payment tokens for a card
        call: platform-digital-wallet.pushprovisioningpaymenttokenslist
        with:
          profileId: rest.profileId
          cardToken: rest.cardToken
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/spend/profiles/{profileid}/cards/{cardtoken}/payment-tokens/{paymenttokenuniquereference}/activation
      name: v3-spend-profiles-profileid-cards-cardtoken-payment-tokens-paymenttokenuniqueref
      description: REST surface for v3-spend-profiles-profileId-cards-cardToken-payment-tokens-paymentTokenUniqueRef.
      operations:
      - method: POST
        name: digitalwalletactivatepaymenttoken
        description: Manual provisioning payment token activation
        call: platform-digital-wallet.digitalwalletactivatepaymenttoken
        with:
          profileId: rest.profileId
          cardToken: rest.cardToken
          paymentTokenUniqueReference: rest.paymentTokenUniqueReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-digital-wallet-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — digital-wallet. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: push-provisioning-apple-pay
      description: Push Provisioning for Apple Pay
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-digital-wallet.pushprovisioningapplepayget
      with:
        x-tw-twcard-card-token: tools.x-tw-twcard-card-token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: push-provisioning-google-pay
      description: Push provisioning for Google Pay
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-digital-wallet.pushprovisioninggooglepayget
      with:
        x-tw-twcard-card-token: tools.x-tw-twcard-card-token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-payment-tokens-card
      description: List payment tokens for a card
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-digital-wallet.pushprovisioningpaymenttokenslist
      with:
        profileId: tools.profileId
        cardToken: tools.cardToken
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: manual-provisioning-payment-token-activation
      description: Manual provisioning payment token activation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-digital-wallet.digitalwalletactivatepaymenttoken
      with:
        profileId: tools.profileId
        cardToken: tools.cardToken
        paymentTokenUniqueReference: tools.paymentTokenUniqueReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
