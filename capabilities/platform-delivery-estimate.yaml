naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — delivery-estimate
  description: 'Wise Platform API — delivery-estimate. 1 operations. Lead operation: Get the delivery estimate for a transfer.
    Self-contained Naftiko capability covering one Wise business surface.'
  tags:
  - Wise
  - delivery-estimate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-delivery-estimate
    baseUri: https://api.wise.com
    description: Wise Platform API — delivery-estimate business capability. Self-contained, no shared references.
    resources:
    - name: v1-delivery-estimates-transferId
      path: /v1/delivery-estimates/{transferId}
      operations:
      - name: deliveryestimateget
        method: GET
        description: Get the delivery estimate for a transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transferId
          in: path
          type: integer
          description: The ID of the transfer.
          required: true
        - name: timezone
          in: query
          type: string
          description: Timezone ID for the formatted text. Defaults to `UTC` if not provided.
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-delivery-estimate-rest
    port: 8080
    description: REST adapter for Wise Platform API — delivery-estimate. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/delivery-estimates/{transferid}
      name: v1-delivery-estimates-transferid
      description: REST surface for v1-delivery-estimates-transferId.
      operations:
      - method: GET
        name: deliveryestimateget
        description: Get the delivery estimate for a transfer
        call: platform-delivery-estimate.deliveryestimateget
        with:
          transferId: rest.transferId
          timezone: rest.timezone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-delivery-estimate-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — delivery-estimate. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-delivery-estimate-transfer
      description: Get the delivery estimate for a transfer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-delivery-estimate.deliveryestimateget
      with:
        transferId: tools.transferId
        timezone: tools.timezone
      outputParameters:
      - type: object
        mapping: $.
