naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — 3ds
  description: 'Wise Platform API — 3ds. 1 operations. Lead operation: Inform challenge result. Self-contained Naftiko capability
    covering one Wise business surface.'
  tags:
  - Wise
  - 3ds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-3ds
    baseUri: https://api.wise.com
    description: Wise Platform API — 3ds business capability. Self-contained, no shared references.
    resources:
    - name: v3-spend-profiles-profileId-3dsecure-challenge-result
      path: /v3/spend/profiles/{profileId}/3dsecure/challenge-result
      operations:
      - name: 3dschallengeresultpost
        method: POST
        description: Inform challenge result
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: The profile ID (personal or business) associated with the 3DS challenge.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-3ds-rest
    port: 8080
    description: REST adapter for Wise Platform API — 3ds. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v3/spend/profiles/{profileid}/3dsecure/challenge-result
      name: v3-spend-profiles-profileid-3dsecure-challenge-result
      description: REST surface for v3-spend-profiles-profileId-3dsecure-challenge-result.
      operations:
      - method: POST
        name: 3dschallengeresultpost
        description: Inform challenge result
        call: platform-3ds.3dschallengeresultpost
        with:
          profileId: rest.profileId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-3ds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — 3ds. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: inform-challenge-result
      description: Inform challenge result
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-3ds.3dschallengeresultpost
      with:
        profileId: tools.profileId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
