naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — quote
  description: 'Wise Platform API — quote. 4 operations. Lead operation: Create a quote (authenticated). Self-contained Naftiko
    capability covering one Wise business surface.'
  tags:
  - Wise
  - quote
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-quote
    baseUri: https://api.wise.com
    description: Wise Platform API — quote business capability. Self-contained, no shared references.
    resources:
    - name: v3-profiles-profileId-quotes
      path: /v3/profiles/{profileId}/quotes
      operations:
      - name: quotecreate
        method: POST
        description: Create a quote (authenticated)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Personal or business profile ID of the sender.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v3-profiles-profileId-quotes-quoteId
      path: /v3/profiles/{profileId}/quotes/{quoteId}
      operations:
      - name: quoteget
        method: GET
        description: Retrieve a quote by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Personal or business profile ID.
          required: true
        - name: quoteId
          in: path
          type: string
          description: The quote ID (GUID format).
          required: true
      - name: quoteupdate
        method: PATCH
        description: Update a quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Personal or business profile ID.
          required: true
        - name: quoteId
          in: path
          type: string
          description: The quote ID (GUID format).
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v3-quotes
      path: /v3/quotes
      operations:
      - name: quotecreateunauthenticated
        method: POST
        description: Create a quote (unauthenticated)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-quote-rest
    port: 8080
    description: REST adapter for Wise Platform API — quote. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v3/profiles/{profileid}/quotes
      name: v3-profiles-profileid-quotes
      description: REST surface for v3-profiles-profileId-quotes.
      operations:
      - method: POST
        name: quotecreate
        description: Create a quote (authenticated)
        call: platform-quote.quotecreate
        with:
          profileId: rest.profileId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/profiles/{profileid}/quotes/{quoteid}
      name: v3-profiles-profileid-quotes-quoteid
      description: REST surface for v3-profiles-profileId-quotes-quoteId.
      operations:
      - method: GET
        name: quoteget
        description: Retrieve a quote by ID
        call: platform-quote.quoteget
        with:
          profileId: rest.profileId
          quoteId: rest.quoteId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: quoteupdate
        description: Update a quote
        call: platform-quote.quoteupdate
        with:
          profileId: rest.profileId
          quoteId: rest.quoteId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/quotes
      name: v3-quotes
      description: REST surface for v3-quotes.
      operations:
      - method: POST
        name: quotecreateunauthenticated
        description: Create a quote (unauthenticated)
        call: platform-quote.quotecreateunauthenticated
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-quote-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — quote. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-quote-authenticated
      description: Create a quote (authenticated)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-quote.quotecreate
      with:
        profileId: tools.profileId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-quote-id
      description: Retrieve a quote by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-quote.quoteget
      with:
        profileId: tools.profileId
        quoteId: tools.quoteId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-quote
      description: Update a quote
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: platform-quote.quoteupdate
      with:
        profileId: tools.profileId
        quoteId: tools.quoteId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-quote-unauthenticated
      description: Create a quote (unauthenticated)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-quote.quotecreateunauthenticated
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
