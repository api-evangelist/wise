naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — claim-account
  description: 'Wise Platform API — claim-account. 1 operations. Lead operation: Generate a claim account code. Self-contained
    Naftiko capability covering one Wise business surface.'
  tags:
  - Wise
  - claim-account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-claim-account
    baseUri: https://api.wise.com
    description: Wise Platform API — claim-account business capability. Self-contained, no shared references.
    resources:
    - name: v1-user-claim-account
      path: /v1/user/claim-account
      operations:
      - name: claimaccountcreate
        method: POST
        description: Generate a claim account code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-claim-account-rest
    port: 8080
    description: REST adapter for Wise Platform API — claim-account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/user/claim-account
      name: v1-user-claim-account
      description: REST surface for v1-user-claim-account.
      operations:
      - method: POST
        name: claimaccountcreate
        description: Generate a claim account code
        call: platform-claim-account.claimaccountcreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-claim-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — claim-account. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: generate-claim-account-code
      description: Generate a claim account code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-claim-account.claimaccountcreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
