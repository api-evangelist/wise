naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — multi-currency-account
  description: 'Wise Platform API — multi-currency-account. 4 operations. Lead operation: Retrieve available currencies. Self-contained
    Naftiko capability covering one Wise business surface.'
  tags:
  - Wise
  - multi-currency-account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-multi-currency-account
    baseUri: https://api.wise.com
    description: Wise Platform API — multi-currency-account business capability. Self-contained, no shared references.
    resources:
    - name: v2-borderless-accounts-configuration-profiles-profileId-available-currencies
      path: /v2/borderless-accounts-configuration/profiles/{profileId}/available-currencies
      operations:
      - name: mcaavailablecurrenciesget
        method: GET
        description: Retrieve available currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Profile ID.
          required: true
    - name: v2-borderless-accounts-configuration-profiles-profileId-payin-currencies
      path: /v2/borderless-accounts-configuration/profiles/{profileId}/payin-currencies
      operations:
      - name: mcapayincurrenciesget
        method: GET
        description: Retrieve payin currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Profile ID.
          required: true
    - name: v4-multi-currency-account-eligibility
      path: /v4/multi-currency-account/eligibility
      operations:
      - name: mcaeligibilityget
        method: GET
        description: Retrieve multi currency account eligibility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: query
          type: integer
          description: Profile ID to check eligibility for.
        - name: country
          in: query
          type: string
          description: 2-letter ISO 3166 country code to check eligibility for.
        - name: state
          in: query
          type: string
          description: 2-letter state/province code. Required when `country` is `US`.
    - name: v4-profiles-profileId-multi-currency-account
      path: /v4/profiles/{profileId}/multi-currency-account
      operations:
      - name: mcaget
        method: GET
        description: Retrieve multi currency account for a profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Profile ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-multi-currency-account-rest
    port: 8080
    description: REST adapter for Wise Platform API — multi-currency-account. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2/borderless-accounts-configuration/profiles/{profileid}/available-currencies
      name: v2-borderless-accounts-configuration-profiles-profileid-available-currencies
      description: REST surface for v2-borderless-accounts-configuration-profiles-profileId-available-currencies.
      operations:
      - method: GET
        name: mcaavailablecurrenciesget
        description: Retrieve available currencies
        call: platform-multi-currency-account.mcaavailablecurrenciesget
        with:
          profileId: rest.profileId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/borderless-accounts-configuration/profiles/{profileid}/payin-currencies
      name: v2-borderless-accounts-configuration-profiles-profileid-payin-currencies
      description: REST surface for v2-borderless-accounts-configuration-profiles-profileId-payin-currencies.
      operations:
      - method: GET
        name: mcapayincurrenciesget
        description: Retrieve payin currencies
        call: platform-multi-currency-account.mcapayincurrenciesget
        with:
          profileId: rest.profileId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v4/multi-currency-account/eligibility
      name: v4-multi-currency-account-eligibility
      description: REST surface for v4-multi-currency-account-eligibility.
      operations:
      - method: GET
        name: mcaeligibilityget
        description: Retrieve multi currency account eligibility
        call: platform-multi-currency-account.mcaeligibilityget
        with:
          profileId: rest.profileId
          country: rest.country
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v4/profiles/{profileid}/multi-currency-account
      name: v4-profiles-profileid-multi-currency-account
      description: REST surface for v4-profiles-profileId-multi-currency-account.
      operations:
      - method: GET
        name: mcaget
        description: Retrieve multi currency account for a profile
        call: platform-multi-currency-account.mcaget
        with:
          profileId: rest.profileId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-multi-currency-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — multi-currency-account. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: retrieve-available-currencies
      description: Retrieve available currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-multi-currency-account.mcaavailablecurrenciesget
      with:
        profileId: tools.profileId
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-payin-currencies
      description: Retrieve payin currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-multi-currency-account.mcapayincurrenciesget
      with:
        profileId: tools.profileId
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-multi-currency-account-eligibility
      description: Retrieve multi currency account eligibility
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-multi-currency-account.mcaeligibilityget
      with:
        profileId: tools.profileId
        country: tools.country
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-multi-currency-account-profile
      description: Retrieve multi currency account for a profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-multi-currency-account.mcaget
      with:
        profileId: tools.profileId
      outputParameters:
      - type: object
        mapping: $.
