          in: path
          type: integer
          description: Your profile ID.
          required: true
        - name: disputeId
          in: path
          type: string
          description: The dispute ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v4-spend-profiles-profileId-dispute-form-file
      path: /v4/spend/profiles/{profileId}/dispute-form/file
      operations:
      - name: disputefileupload
        method: POST
        description: Upload dispute file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Your profile ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
