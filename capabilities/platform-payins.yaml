naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — payins
  description: 'Wise Platform API — payins. 1 operations. Lead operation: Create PayNow payment details. Self-contained Naftiko
    capability covering one Wise business surface.'
  tags:
  - Wise
  - payins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-payins
    baseUri: https://api.wise.com
    description: Wise Platform API — payins business capability. Self-contained, no shared references.
    resources:
    - name: v1-profiles-profileId-payin-sessions-payinSessionId-paynow
      path: /v1/profiles/{profileId}/payin-sessions/{payinSessionId}/paynow
      operations:
      - name: paynowcreate
        method: POST
        description: Create PayNow payment details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileId
          in: path
          type: integer
          description: Profile ID of the profile that created the transfer.
          required: true
        - name: payinSessionId
          in: path
          type: string
          description: Payin Session ID retrieved from Transfer object.
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-payins-rest
    port: 8080
    description: REST adapter for Wise Platform API — payins. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/profiles/{profileid}/payin-sessions/{payinsessionid}/paynow
      name: v1-profiles-profileid-payin-sessions-payinsessionid-paynow
      description: REST surface for v1-profiles-profileId-payin-sessions-payinSessionId-paynow.
      operations:
      - method: POST
        name: paynowcreate
        description: Create PayNow payment details
        call: platform-payins.paynowcreate
        with:
          profileId: rest.profileId
          payinSessionId: rest.payinSessionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-payins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — payins. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-paynow-payment-details
      description: Create PayNow payment details
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-payins.paynowcreate
      with:
        profileId: tools.profileId
        payinSessionId: tools.payinSessionId
      outputParameters:
      - type: object
        mapping: $.
