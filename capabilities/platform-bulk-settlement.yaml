naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — bulk-settlement
  description: 'Wise Platform API — bulk-settlement. 1 operations. Lead operation: Send a settlement journal. Self-contained
    Naftiko capability covering one Wise business surface.'
  tags:
  - Wise
  - bulk-settlement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-bulk-settlement
    baseUri: https://api.wise.com
    description: Wise Platform API — bulk-settlement business capability. Self-contained, no shared references.
    resources:
    - name: v1-settlements
      path: /v1/settlements
      operations:
      - name: bulksettlementjournalcreate
        method: POST
        description: Send a settlement journal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-bulk-settlement-rest
    port: 8080
    description: REST adapter for Wise Platform API — bulk-settlement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/settlements
      name: v1-settlements
      description: REST surface for v1-settlements.
      operations:
      - method: POST
        name: bulksettlementjournalcreate
        description: Send a settlement journal
        call: platform-bulk-settlement.bulksettlementjournalcreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-bulk-settlement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — bulk-settlement. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: send-settlement-journal
      description: Send a settlement journal
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-bulk-settlement.bulksettlementjournalcreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
