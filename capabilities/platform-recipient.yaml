      description: REST surface for v1-accounts-accountId.
      operations:
      - method: GET
        name: recipientgetv1
        description: Get account by ID (v1)
        call: platform-recipient.recipientgetv1
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
