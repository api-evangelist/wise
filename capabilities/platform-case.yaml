naftiko: 1.0.0-alpha2
info:
  label: Wise Platform API — case
  description: 'Wise Platform API — case. 4 operations. Lead operation: Create a partner case. Self-contained Naftiko capability
    covering one Wise business surface.'
  tags:
  - Wise
  - case
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WISE_API_KEY: WISE_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-case
    baseUri: https://api.wise.com
    description: Wise Platform API — case business capability. Self-contained, no shared references.
    resources:
    - name: v1-cases
      path: /v1/cases
      operations:
      - name: casecreate
        method: POST
        description: Create a partner case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-cases-caseId
      path: /v1/cases/{caseId}
      operations:
      - name: caseget
        method: GET
        description: Retrieve a partner case by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: integer
          description: Partner Case ID.
          required: true
    - name: v1-cases-caseId-comments
      path: /v1/cases/{caseId}/comments
      operations:
      - name: casecommentsget
        method: GET
        description: Retrieve partner case comments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: integer
          description: Partner Case ID.
          required: true
      - name: casecommentcreate
        method: PUT
        description: Add a partner case comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: integer
          description: Partner Case ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WISE_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-case-rest
    port: 8080
    description: REST adapter for Wise Platform API — case. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/cases
      name: v1-cases
      description: REST surface for v1-cases.
      operations:
      - method: POST
        name: casecreate
        description: Create a partner case
        call: platform-case.casecreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/cases/{caseid}
      name: v1-cases-caseid
      description: REST surface for v1-cases-caseId.
      operations:
      - method: GET
        name: caseget
        description: Retrieve a partner case by ID
        call: platform-case.caseget
        with:
          caseId: rest.caseId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/cases/{caseid}/comments
      name: v1-cases-caseid-comments
      description: REST surface for v1-cases-caseId-comments.
      operations:
      - method: GET
        name: casecommentsget
        description: Retrieve partner case comments
        call: platform-case.casecommentsget
        with:
          caseId: rest.caseId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: casecommentcreate
        description: Add a partner case comment
        call: platform-case.casecommentcreate
        with:
          caseId: rest.caseId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-case-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wise Platform API — case. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-partner-case
      description: Create a partner case
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-case.casecreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-partner-case-id
      description: Retrieve a partner case by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-case.caseget
      with:
        caseId: tools.caseId
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-partner-case-comments
      description: Retrieve partner case comments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-case.casecommentsget
      with:
        caseId: tools.caseId
      outputParameters:
      - type: object
        mapping: $.
    - name: add-partner-case-comment
      description: Add a partner case comment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: platform-case.casecommentcreate
      with:
        caseId: tools.caseId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
