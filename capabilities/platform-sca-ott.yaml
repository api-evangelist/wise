      operations:
      - name: ottstatusgetv1
        method: GET
        description: Get OTT status (v1)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: One-Time-Token
          in: header
          type: string
          description: Text value of a OTT.
          required: true
