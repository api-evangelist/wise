        name: ottstatusgetv1
        description: Get OTT status (v1)
        call: platform-sca-ott.ottstatusgetv1
        with:
          One-Time-Token: rest.One-Time-Token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/one-time-token/status
